<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>KIAgent · Sign-in expired</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="shared.css" />
<style>
  body { margin: 0; padding: 0; background: #f0eee9; }

  .err-shell {
    width: 1200px; height: 800px;
    background: var(--bg-canvas-warm);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); color: var(--text-primary);
    position: relative; overflow: hidden;
  }
  .err-shell::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(900px 480px at 50% 0%, rgba(225,29,72,0.07), transparent 60%);
    pointer-events: none;
  }

  .err-topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center;
    padding: 14px 28px;
    font-size: 12px; color: var(--text-secondary);
  }
  .err-topbar .wordmark { color: var(--text-primary); }

  .err-card {
    position: relative; z-index: 1;
    width: 480px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-top: 3px solid var(--error-solid);
    box-shadow: var(--shadow-lg);
    padding: 36px 40px 28px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .err-icon {
    width: 44px; height: 44px;
    background: var(--error-subtle); color: var(--error-solid);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .err-title {
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    margin: 0; color: var(--text-primary);
  }
  .err-body {
    font-size: 13.5px; line-height: 1.6; margin: 0;
    color: var(--text-secondary);
  }
  .err-detail-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: var(--bg-muted);
    border: 1px solid var(--border-subtle);
    font-family: var(--font-mono); font-size: 11.5px;
    color: var(--text-secondary);
  }
  .err-detail-row .label {
    font-family: var(--font-sans); font-weight: 600;
    color: var(--text-primary); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .err-detail-row .code {
    color: var(--error-solid); font-weight: 500;
    margin-left: auto;
  }
  .err-actions {
    display: flex; gap: 8px;
    padding-top: 6px;
  }
  .err-actions .btn { height: 36px; padding: 0 14px; font-size: 13px; }

  .err-foot {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
    font-size: 11.5px; color: var(--text-tertiary);
    display: flex; gap: 6px; align-items: center;
  }
  .err-foot a { color: var(--accent-text); text-decoration: none; }
</style>
</head>
<body>

<div class="err-shell">
  <div class="err-topbar">
    <span class="wordmark"><span class="spark">&#10022;</span>kia</span>
    <span style="margin-left:auto"><a class="link" href="/help">Help</a></span>
  </div>

  <div class="err-card">
    <div class="err-icon">
      <svg class="i" width="22" height="22"><use href="#i-alert-circle"/></svg>
    </div>

    <h1 class="err-title">Sign-in expired</h1>

    <p class="err-body">Your sign-in link timed out. This usually happens after waiting too long, or opening the link in a different browser than the one you started in.</p>

    <div class="err-detail-row">
      <span class="label">Code</span>
      <span>state_mismatch</span>
      <span class="code">HTTP 400</span>
    </div>

    <div class="err-actions">
      <a class="btn primary" href="/">Sign in again</a>
      <a class="btn" href="/help">
        <svg class="i" width="12" height="12"><use href="#i-info"/></svg>
        Why did this happen?
      </a>
    </div>

    <div class="err-foot">
      <svg class="i" width="12" height="12"><use href="#i-mail"/></svg>
      <span>Still stuck? Email <a href="mailto:support@lokalkiagent.de">support@lokalkiagent.de</a></span>
    </div>
  </div>
</div>

<script src="icons.js"></script>
</body>
</html>
