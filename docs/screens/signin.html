<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>KIAgent · Sign in</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="shared.css" />
</head>
<body>

<div class="mac-window ac" style="width:960px;height:640px">
  <div class="mac-titlebar">
    <div class="mac-lights"><span class="l-red"></span><span class="l-yellow"></span><span class="l-green"></span></div>
    <div class="mac-title">KIAgent</div>
  </div>
  <div class="mac-body">
    <div class="onb-shell">
      <div class="onb-card">
        <div class="onb-head">
          <span class="wordmark"><span class="spark">✦</span>KIAgent</span>
          <div class="onb-title">Welcome to KIAgent</div>
          <p class="onb-sub">Index your sources into a local, searchable workspace. Everything stays on this machine — your scopes, your data.</p>
        </div>

        <div class="onb-providers">
          <button type="button" class="prov-row google-signin">
            <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.17-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.36 0-4.36-1.6-5.07-3.74H.96v2.33A9 9 0 0 0 9 18z"/>
              <path fill="#FBBC05" d="M3.93 10.68A5.4 5.4 0 0 1 3.64 9c0-.58.1-1.15.29-1.68V4.99H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.01l2.97-2.33z"/>
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.99l2.97 2.33C4.64 5.18 6.64 3.58 9 3.58z"/>
            </svg>
            <span class="prov-label">Continue with Google</span>
          </button>

          <button type="button" class="prov-row microsoft-signin">
            <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0">
              <rect x="0"  y="0"   width="8.4" height="8.4" fill="#F25022"/>
              <rect x="9.6" y="0"   width="8.4" height="8.4" fill="#7FBA00"/>
              <rect x="0"  y="9.6" width="8.4" height="8.4" fill="#00A4EF"/>
              <rect x="9.6" y="9.6" width="8.4" height="8.4" fill="#FFB900"/>
            </svg>
            <span class="prov-label">Continue with Microsoft</span>
          </button>

          <div class="onb-divider">
            <div class="line"></div><span class="or">or</span><div class="line"></div>
          </div>

          <button type="button" class="prov-row local-folder">
            <svg class="i" width="18" height="18" style="color:var(--accent-text)"><use href="#i-folder"/></svg>
            <span class="prov-label">Choose a local folder</span>
            <span class="prov-meta">Instant</span>
          </button>
        </div>

        <div class="onb-footer">
          <svg class="i" width="12" height="12" style="color:var(--text-tertiary);vertical-align:-2px;margin-right:4px"><use href="#i-shield"/></svg>
          Indexed locally · no telemetry · your OAuth client, your scopes
        </div>
      </div>
    </div>
  </div>
</div>

<script src="icons.js"></script>
</body>
</html>
