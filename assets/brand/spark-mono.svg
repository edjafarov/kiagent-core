<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- macOS tray template — the Spark held inside the Bracket reticle (four
       corner ticks). Tray-only variant: unlike the app/dock icon the reticle
       sits flush to the tile edge (no inset margin) so the Spark can run
       larger — the menubar tile is tiny and the breathing room is wasted.
       Single black layer; the OS tints it (black on light menubars, white on
       dark). Authored on the 100u grid. -->
  <g fill="none" stroke="#000000" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter">
    <path d="M4 22 L4 4 L22 4"/>
    <path d="M96 22 L96 4 L78 4"/>
    <path d="M4 78 L4 96 L22 96"/>
    <path d="M96 78 L96 96 L78 96"/>
  </g>
  <g transform="translate(21 21) scale(0.58)">
    <path d="M50 3 C 52.5 33 67 47.5 97 50 C 67 52.5 52.5 67 50 97 C 47.5 67 33 52.5 3 50 C 33 47.5 47.5 33 50 3 Z" fill="#000000"/>
  </g>
</svg>
